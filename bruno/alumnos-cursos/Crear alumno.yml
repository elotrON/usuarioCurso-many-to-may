info:
  name: Crear alumno
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/alumno
  body:
    type: json
    data: |-
      {
        "nombre": "Juan",
        "apellidos": "Alvarez",
        "dni": "777777Z",
        "direccion": "Gran Via 55",
        "telefono": "111222333"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
